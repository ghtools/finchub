<script>
// Tab Switching
function showTab(tab, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  el.classList.add('active');
}

// Country Change
function setCountry(code) {
  // Future mein currency change kar sakte hain
  console.log('Country changed:', code);
}

// EMI Calculator
function calcEMI() {
  const amount = parseFloat(document.getElementById('emi-amount').value);
  const rate = parseFloat(document.getElementById('emi-rate').value) / 100 / 12;
  const months = parseFloat(document.getElementById('emi-months').value);

  if (!amount || !rate || !months) {
    alert("Please fill all fields");
    return;
  }

  const emi = (amount * rate * Math.pow(1 + rate, months)) / (Math.pow(1 + rate, months) - 1);
  const total = emi * months;
  const interest = total - amount;

  document.getElementById('emi-result').innerHTML = `
    <div style="padding:15px;background:#1a1d24;border-radius:12px">
      <div><strong>Monthly EMI:</strong> ${emi.toFixed(2)} SAR</div>
      <div><strong>Total Payment:</strong> ${total.toFixed(2)} SAR</div>
      <div><strong>Total Interest:</strong> ${interest.toFixed(2)} SAR</div>
    </div>
  `;
  document.getElementById('emi-result').style.display = 'block';
}

// Share function
function shareResult(type) {
  const text = `I used FinchHub ${type} Calculator! Try it: https://finchub.vercel.app`;
  if (navigator.share) {
    navigator.share({title: 'FinchHub', text});
  } else {
    navigator.clipboard.writeText(text).then(() => alert('Link copied!'));
  }
}
</script>
